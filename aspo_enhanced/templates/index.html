<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aspo AI — Intelligent Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

<!-- Ambient background orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="noise-overlay"></div>

<!-- File Upload Toast -->
<div id="upload-toast" class="upload-toast" style="display:none">
  <div class="upload-toast-inner">
    <span class="upload-toast-icon">📎</span>
    <span id="upload-toast-text">File attached</span>
    <button onclick="clearAttachment()" class="upload-toast-close">✕</button>
  </div>
</div>

<div class="app-shell">

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-mark">
          <div class="brand-hexagon">
            <svg viewBox="0 0 40 40" fill="none">
              <polygon points="20,2 36,11 36,29 20,38 4,29 4,11" fill="none" stroke="currentColor" stroke-width="1.5"/>
              <text x="20" y="25" text-anchor="middle" font-size="14" fill="currentColor" font-family="Syne" font-weight="700">S</text>
            </svg>
          </div>
        </div>
        <div class="brand-text">
          <span class="brand-name">Aspo AI</span>
          <span class="brand-tagline">v4.1</span>
        </div>
        <button class="sidebar-close-btn" onclick="toggleSidebar()" title="Close sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>

      <!-- New Chat -->
      <button class="new-chat-btn" onclick="createNewChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><path d="M12 5v14M5 12h14"/></svg>
        <span>New Conversation</span>
      </button>

      <!-- Chat History -->
      <div class="history-section">
        <div class="history-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Recent
        </div>
        <div class="chat-list" id="chat-list"></div>
      </div>

      <!-- Sidebar Footer -->
      <div class="sidebar-foot">
        <div class="rag-status">
          <div class="rag-pulse-dot"></div>
          <span>Aspo AI</span>
        </div>
        <button class="theme-pill" onclick="toggleTheme()">
          <span id="theme-icon">🌙</span>
          <span id="theme-label">Dark</span>
        </button>
      </div>

    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main class="chat-main" id="chat-main">

    <!-- Topbar -->
    <header class="topbar">
      <button class="icon-btn" onclick="toggleSidebar()" title="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <div class="topbar-center">
        <div class="topbar-title-wrap" id="title-static">
          <span class="live-dot"></span>
          <span class="topbar-title" id="chat-title-display">New Conversation</span>
          <button class="icon-btn-sm" id="rename-btn" onclick="startRename()" style="display:none" title="Rename">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
        </div>
        <!-- Rename inline -->
        <div class="rename-inline" id="rename-bar" style="display:none">
          <input id="rename-input" type="text" placeholder="Rename chat…" maxlength="60"/>
          <button class="pill-btn pill-btn-sm" onclick="submitRename()">Save</button>
          <button class="pill-btn pill-btn-sm ghost" onclick="cancelRename()">✕</button>
        </div>
      </div>

      <div class="topbar-actions">
        <div class="source-chip" id="source-chip" style="display:none">
          <span id="source-chip-text">✦ </span>
        </div>
        <!-- TTS toggle button -->
        <button class="icon-btn" id="tts-toggle-btn" onclick="toggleTTS()" title="Toggle voice responses">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" id="tts-icon">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
        <button class="icon-btn danger-btn" id="delete-btn" onclick="deleteCurrentChat()" style="display:none" title="Delete chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        </button>
      </div>
    </header>

    <!-- Chatbox -->
    <div class="chatbox" id="chatbox">
      <!-- Welcome injected by JS -->
    </div>

    <!-- Input Zone -->
    <div class="input-zone">
      <!-- File preview bar -->
      <div class="file-preview-bar" id="file-preview-bar" style="display:none">
        <div class="file-preview-chip">
          <span class="file-icon" id="file-preview-icon">📄</span>
          <span class="file-preview-name" id="file-preview-name">file.txt</span>
          <span class="file-preview-size" id="file-preview-size"></span>
          <button class="file-remove-btn" onclick="clearAttachment()" title="Remove file">✕</button>
        </div>
      </div>

      <div class="input-card" id="input-card">
        <textarea
          id="user-input"
          placeholder="Ask anything…"
          rows="1"
          maxlength="4000"
        ></textarea>
        <div class="input-foot">
          <span class="char-counter" id="char-count">0 / 4000</span>
          <div class="input-foot-actions">
            <span class="model-tag">Llama 3.3 · 70B</span>

            <!-- File upload button -->
            <button class="icon-action-btn" id="upload-btn" onclick="document.getElementById('file-input').click()" title="Attach file">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
            <input type="file" id="file-input" style="display:none" accept=".txt,.pdf,.md,.csv,.json,.py,.js,.html,.css,.xml,.docx,.xlsx" onchange="handleFileAttach(event)"/>

            <!-- Voice input button -->
            <button class="icon-action-btn" id="voice-btn" onclick="toggleVoiceInput()" title="Voice input">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15" id="mic-icon">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </button>

            <button class="send-btn" id="send-btn" onclick="sendMessage()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <p class="disclaimer">AI can make mistakes. Always verify critical information.</p>
    </div>

  </main>
</div>

<!-- Voice Recording Overlay -->
<div id="voice-overlay" class="voice-overlay" style="display:none">
  <div class="voice-modal">
    <div class="voice-ring-wrap">
      <div class="voice-ring voice-ring-outer"></div>
      <div class="voice-ring voice-ring-inner"></div>
      <div class="voice-center-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        </svg>
      </div>
    </div>
    <p class="voice-status" id="voice-status">Listening…</p>
    <p class="voice-transcript" id="voice-transcript"></p>
    <button class="voice-stop-btn" onclick="stopVoiceInput()">Stop</button>
  </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
